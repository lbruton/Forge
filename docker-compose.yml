services:
  forge:
    build: .
    container_name: forge
    restart: unless-stopped
    ports:
      - '8070:80'

  forge-vuln-cisco-init:
    image: alpine:3.20
    container_name: forge-vuln-cisco-init
    volumes:
      - forge-vuln-data:/data
    entrypoint: ['/bin/sh', '-c', 'chown -R 1000:1000 /data && echo init done']
    restart: 'no'

  forge-vuln-cisco:
    build:
      context: ./sidecar/vuln-cisco
      dockerfile: Dockerfile
    container_name: forge-vuln-cisco
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
      - FORGE_CORS_ORIGIN=${FORGE_CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - forge-vuln-data:/data
    depends_on:
      forge-vuln-cisco-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  forge-vuln-data:
